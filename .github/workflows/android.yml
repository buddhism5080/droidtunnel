name: Android Build

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.2.1"

      - name: Verify bundled cloudflared binaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = [
              Path('app/src/main/jniLibs/arm64-v8a/libcloudflared.so'),
              Path('app/src/main/jniLibs/armeabi-v7a/libcloudflared.so'),
          ]

          for target in targets:
              if not target.exists():
                  raise SystemExit(f'Missing cloudflared binary: {target}')
              size = target.stat().st_size
              print(f'{target}: {size} bytes')
              if size < 1_000_000:
                  raise SystemExit(f'Binary looks like a placeholder and is too small: {target} ({size} bytes)')
          PY

      - name: Build and run unit tests
        run: gradle test assembleDebug assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
